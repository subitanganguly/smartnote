            margin: 5px;
            border-radius: 8px;

            box-shadow: 3px 3px 5px #7bbfb4, -3px -3px 5px #ccf6f3;

            background: linear-gradient(145deg, #f5a3a3, #e07f7f);
            color: #900;
            box-shadow: 3px 3px 5px #b36b6b, -3px -3px 5px #ffcccc;
        }

        /* Delete Button */
        .calc-del-btn {
            background: linear-gradient(145deg, #cccccc, #a6a6a6);
            color: #333;
            box-shadow: 3px 3px 5px #999, -3px -3px 5px #fff;
        }

        /* Hover Effects */

        .floating-btn {

            height: 60px;

            // Auto-suggestion function for description input (matches ANY word)
function attachDescriptionAutocomplete(input) {
    const wrapper = input.parentElement;
    wrapper.style.position = "relative";

    // Remove any existing suggestion box
    const existingBox = wrapper.querySelector(".suggest-box");
    if (existingBox) existingBox.remove();

    const box = document.createElement("div");
    box.className = "suggest-box";
    wrapper.appendChild(box);

    // Input event listener
    input.addEventListener("input", () => {
        const val = input.value.trim().toLowerCase();
        box.innerHTML = "";

        if (!val) return;

        // Split search into individual words
        const searchWords = val.split(/\s+/).filter(word => word.length > 0);
        
        if (searchWords.length === 0) return;

        // Find matches where ANY word from the search appears in the suggestion
        const matches = descriptionSuggestions.filter(item => {
            const itemLower = item.toLowerCase();
            // Check if ANY of the search words is found in the item
            return searchWords.some(word => itemLower.includes(word));
        });

        // Limit to first 10 matches for performance
        const limitedMatches = matches.slice(0, 10);

        if (!limitedMatches.length) return;

        const list = document.createElement("div");
        list.className = "suggest-list";

        limitedMatches.forEach(item => {
            const div = document.createElement("div");
            div.className = "suggest-item";
            
            // Highlight the matching words
            let displayText = item;
            searchWords.forEach(word => {
                if (word.length > 1) { // Only highlight words longer than 1 character
                    const regex = new RegExp(`(${word})`, 'gi');
                    displayText = displayText.replace(regex, '<mark style="background: #ffc107; color: #000; padding: 0;">$1</mark>');
                }
            });
            
            div.innerHTML = displayText;
            div.style.textTransform = "uppercase";

            div.onclick = () => {
                input.value = item;
                box.innerHTML = "";
            };

            list.appendChild(div);
        });

        box.appendChild(list);
    });

    // Close on outside click
    document.addEventListener("click", e => {
        if (!wrapper.contains(e.target)) {
            box.innerHTML = "";
        }
    });

    // Close on escape key
    input.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
            box.innerHTML = "";
        }
    });
}

            // Function to load suggestions from Firebase
            function loadSuggestions() {
                const expensesRef = firebase.database().ref(`expenses/${userId}`);
                
                expensesRef.once("value", (snapshot) => {
                    const descriptions = new Set();
                    const labels = new Set();

                    snapshot.forEach((childSnapshot) => {
                        const expense = childSnapshot.val();
                        if (expense.description) {
                            descriptions.add(expense.description);
                        }
                        if (expense.label) {
                            labels.add(expense.label);
                        }
                    });

                    descriptionSuggestions = Array.from(descriptions).sort();
                    labelSuggestions = Array.from(labels).sort();
                });
            }

            // Function to load unique labels for filter dropdown
            function loadLabels() {
                const labelFilter = document.getElementById("labelFilter");
                const expensesRef = firebase.database().ref(`expenses/${userId}`);

                // Fetch all expenses to extract unique labels
                expensesRef.once("value", (snapshot) => {
                    const labels = new Set(); // Use a Set to ensure uniqueness
                    snapshot.forEach((childSnapshot) => {
                        const expense = childSnapshot.val();
                        if (expense.label) {
                            labels.add(expense.label); // Add the label if it exists
                        }
                    });

                    // Clear and repopulate the dropdown
                    labelFilter.innerHTML = '<option value="">All Labels</option>'; // Default option
                    labels.forEach((label) => {
                        const option = document.createElement("option");
                        option.value = label;
                        option.textContent = label;
                        labelFilter.appendChild(option);
                    });
                });
            }

            // Function to load user-specific expenses with filters
            function loadUserExpenses() {
                // Show loading spinner
                document.getElementById("loadingSpinner").style.display = "flex";

                const expensesRef = firebase.database().ref(`expenses/${userId}`);
                const searchText = document.getElementById("searchInput").value.toLowerCase();
                const startDate = document.getElementById("startDate").value;
                const endDate = document.getElementById("endDate").value;
                const selectedLabel = document.getElementById("labelFilter").value;
                const selectedType = document.getElementById("typeFilter")?.value || "";

                expensesRef.once("value", (snapshot) => {
                    expensesList.innerHTML = "";
                    let totalBalance = 0;
                    let totalEarningsAmount = 0;
                    let totalExpensesAmount = 0;
                    let expensesArray = [];

                    snapshot.forEach((childSnapshot) => {
                        const expense = childSnapshot.val();
                        const expenseDate = new Date(expense.date);
                        const expenseYearMonthDay = expenseDate.toISOString().split("T")[0];
                        const expenseMonth = expenseDate.getMonth();
                        
                        // Set default type if not exists (for backward compatibility)
                        const expenseType = expense.type || "expense";

                        // Apply filters: description, date range, month, label, and type
                        const matchesDescription = searchText ? expense.description.toLowerCase().includes(searchText) : true;
                        const matchesStartDate = startDate ? expenseYearMonthDay >= startDate : true;
                        const matchesEndDate = endDate ? expenseYearMonthDay <= endDate : true;
                        const matchesMonth = selectedMonth !== null ? expenseMonth === selectedMonth : true;
                        const matchesLabel = selectedLabel ? expense.label === selectedLabel : true;
                        const matchesType = selectedType ? expenseType === selectedType : true;

                        // Include expense only if it matches all active filters
                        if (matchesDescription && matchesStartDate && matchesEndDate && matchesMonth && matchesLabel && matchesType) {
                            expensesArray.push({
                                id: childSnapshot.key,
                                date: expense.date,
                                description: expense.description,
                                amount: expense.amount,
                                label: expense.label || "No Label",
                                type: expenseType
                            });
                        }
                    });

                    // Reverse the array to show the most recent expense first
                    expensesArray.reverse();

                    // Display expenses in reverse order
                    if (expensesArray.length > 0) {
                        expensesArray.forEach((expense) => {
                            const expenseDateFormatted = new Date(expense.date).toLocaleDateString("en-GB", {
                                day: "numeric",
                                month: "short",
                                year: "numeric"
                            });
                            
                            // Set color based on type
                            const typeColor = expense.type === "earnings" ? "text-success" : "text-danger";
                            const typeIcon = expense.type === "earnings" ? "fa-arrow-up" : "fa-arrow-down";
                            
                            const listItem = document.createElement("li");
                            listItem.classList.add("group-item");

                            listItem.innerHTML = `
                                <div class="glass mb-1 text-light text-uppercase zoom p-1">
                                    <div class="d-flex justify-content-between align-items-center" style="margin-left: 20px;">
                                        <span style="font-size: 12px; ">
                                            <b><i class="fas fa-wallet"></i> ${expense.description}</b>
                                            <span class="${typeColor}"> 
                                                <i class="fas ${typeIcon}"></i> ₹${expense.amount.toFixed(2)}
                                            </span><br>
                                            <span class="me-2" style="font-size: 12px;">${expenseDateFormatted}
                                            </span>
                                            <span class="badge category-badge bg-primary">${expense.label}</span>
                                            <span class="badge ${expense.type === 'earnings' ? 'bg-success' : 'bg-danger'}">${expense.type}</span>
                                        </span> 
                                        <span>
                                            <div class="dropstart">
                                                <a class="btn btn-sm text-light" href="#" role="button" id="dropdownMenuLink" data-bs-toggle="dropdown" aria-expanded="false">
                                                    <i class="fas fa-ellipsis-v"></i>  
                                                </a>
                                                <ul class="dropdown-menu" aria-labelledby="dropdownMenuLink" data-bs-boundary="viewport">
                                                    <li>
                                                        <a class="btn btn-sm me-3 edit-btn" data-id="${expense.id}" style="font-size: 12px;">Edit</a>
                                                        <a class="btn btn-sm delete-btn" data-id="${expense.id}" style="font-size: 12px;">Delete</a>
                                                    </li>
                                                </ul>
                                            </div>
                                        </span>
                                    </div>
                                </div>
                            `;

                            // Add edit functionality
                            listItem.querySelector(".edit-btn").addEventListener("click", (e) => {
                                const expenseId = e.target.getAttribute("data-id");
                                openEditModal(expenseId);
                            });

                            // Add delete functionality with confirmation alert
                            listItem.querySelector(".delete-btn").addEventListener("click", () => {
                                if (confirm("Are you sure you want to delete this expense?")) {
                                    expensesRef.child(expense.id).remove()
                                        .then(() => {
                                            alert("Expense deleted successfully.");
                                            loadUserExpenses();
                                            loadLabels();
                                            loadSuggestions(); // Reload suggestions
                                        })
                                        .catch((error) => {
                                            console.error("Error deleting expense:", error);
                                            alert("Failed to delete the expense. Please try again.");
                                        });
                                }
                            });

                            expensesList.appendChild(listItem);
                            
                            // Calculate totals based on type
                            if (expense.type === "earnings") {
                                totalEarningsAmount += expense.amount;
                                totalBalance += expense.amount;
                            } else {
                                totalExpensesAmount += expense.amount;
                                totalBalance -= expense.amount;
                            }
                        });

                        // Update total amount (net balance)
                        const balanceColor = totalBalance >= 0 ? "text-success" : "text-danger";
                        totalAmount.innerHTML = `<span class="${balanceColor}">₹${Math.abs(totalBalance).toFixed(2)} ${totalBalance >= 0 ? '(Credit)' : '(Debit)'}</span>`;
                        
                        // Update summary boxes
                        document.getElementById("totalEarnings").innerHTML = `₹${totalEarningsAmount.toFixed(2)}`;
                        document.getElementById("totalExpenses").innerHTML = `₹${totalExpensesAmount.toFixed(2)}`;
                        
                    } else {
                        // Show message when no expenses are found
                        expensesList.innerHTML = "<li class='list-group-item glass text-light'>No records found</li>";
                        totalAmount.innerHTML = "₹0.00";
                        document.getElementById("totalEarnings").innerHTML = "₹0.00";
                        document.getElementById("totalExpenses").innerHTML = "₹0.00";
                    }

                    // Hide loading spinner after data is loaded
                    document.getElementById("loadingSpinner").style.display = "none";
                });
            }

            // Open the modal with pre-filled data for editing
            function openEditModal(expenseId) {
                const expensesRef = firebase.database().ref(`expenses/${userId}`).child(expenseId);

                // Fetch the expense data
                expensesRef.once("value", (snapshot) => {
                    const expense = snapshot.val();
                    expenseDescription.value = expense.description;
                    expenseLabel.value = expense.label;
                    expenseAmount.value = expense.amount;
                    expenseDate.value = expense.date;
                    
                    // Set the correct type radio button
                    if (expense.type === "earnings") {
                        document.getElementById("typeEarnings").checked = true;
                    } else {
                        document.getElementById("typeExpense").checked = true;
                    }

                    // Store the expenseId in a global variable to use when saving
                    window.currentExpenseId = expenseId;

                    // Open the modal
                    const modal = new bootstrap.Modal(document.getElementById('expenseModal'));
                    modal.show();
                });
            }

            // Function to save the edited expense or add a new one
            addExpenseBtn.addEventListener("click", () => {
                const description = expenseDescription.value.trim();
                const label = expenseLabel.value.trim();
                const amount = parseFloat(expenseAmount.value);
                const date = expenseDate.value;
                
                // Get selected type
                const type = document.querySelector('input[name="expenseType"]:checked')?.value || "expense";

                if (description && label && !isNaN(amount) && date && userId) {
                    // Disable the button to prevent multiple submissions
                    addExpenseBtn.disabled = true;

                    if (window.currentExpenseId) {
                        // Update the existing expense in Firebase (Edit mode)
                        const expensesRef = firebase.database().ref(`expenses/${userId}`).child(window.currentExpenseId);
                        expensesRef.update({
                            description: description,
                            label: label,
                            amount: amount,
                            date: date,
                            type: type
                        }).then(() => {
                            addExpenseBtn.disabled = false;
                            resetForm();
                            document.getElementById("typeExpense").checked = true;
                            const modal = bootstrap.Modal.getInstance(document.getElementById('expenseModal'));
                            modal.hide();
                            window.currentExpenseId = null;
                            loadUserExpenses();
                            loadLabels();
                            loadSuggestions(); // Reload suggestions
                            archiveExpenses();
                        }).catch((error) => {
                            console.error("Error updating expense:", error);
                            addExpenseBtn.disabled = false;
                        });
                    } else {
                        // Add a new expense to Firebase (Add mode)
                        const expensesRef = firebase.database().ref(`expenses/${userId}`).push();
                        expensesRef.set({
                            description: description,
                            label: label,
                            amount: amount,
                            date: date,
                            type: type
                        }).then(() => {
                            addExpenseBtn.disabled = false;
                            resetForm();
                            document.getElementById("typeExpense").checked = true;
                            const modal = bootstrap.Modal.getInstance(document.getElementById('expenseModal'));
                            modal.hide();
                            loadUserExpenses();
                            loadLabels();
                            loadSuggestions(); // Reload suggestions
                            archiveExpenses();
                        }).catch((error) => {
                            console.error("Error adding expense:", error);
                            addExpenseBtn.disabled = false;
                        });
                    }
                } else {
                    alert("Please enter all expense details.");
                }
            });

            // Mouse wheel scroll for horizontal scrolling - Month Filter
            const monthFilter = document.getElementById("monthFilter");
            monthFilter.addEventListener("wheel", (event) => {
                if (event.deltaY !== 0) {
                    monthFilter.scrollLeft += event.deltaY;
                    event.preventDefault();
                }
            });

            // Event listener for month filter buttons
            document.querySelectorAll("#monthFilter button").forEach((btn) => {
                btn.addEventListener("click", () => {
                    selectedMonth = parseInt(btn.getAttribute("data-month"), 10);

                    document.querySelectorAll("#monthFilter button").forEach((button) => {
                        button.classList.remove("btn-dark");
                        button.classList.add("btn-outline-secondary");
                    });
                    btn.classList.remove("btn-outline-secondary");
                    btn.classList.add("btn-dark");

                    loadUserExpenses();
                });
            });

            // Mouse wheel scroll for horizontal scrolling - Button Scroll
            const buttonScroll = document.getElementById("buttonScroll");
            buttonScroll.addEventListener("wheel", (event) => {
                if (event.deltaY !== 0) {
                    buttonScroll.scrollLeft += event.deltaY;
                    event.preventDefault();
                }
            });

            // Event listeners for filters
            document.getElementById("searchInput").addEventListener("input", loadUserExpenses);
            document.getElementById("startDate").addEventListener("input", loadUserExpenses);
            document.getElementById("endDate").addEventListener("input", loadUserExpenses);
            document.getElementById("labelFilter").addEventListener("change", loadUserExpenses);
            
            // Add event listener for type filter
            if (document.getElementById("typeFilter")) {
                document.getElementById("typeFilter").addEventListener("change", function() {
                    loadUserExpenses();
                });
            }

            // Reset Filters Button
            document.getElementById("resetFiltersBtn").addEventListener("click", () => {
                document.getElementById("searchInput").value = "";
                document.getElementById("startDate").value = "";
                document.getElementById("endDate").value = "";
                selectedMonth = null;
                document.getElementById("labelFilter").value = "";
                
                if (document.getElementById("typeFilter")) {
                    document.getElementById("typeFilter").value = "";
                }

                document.querySelectorAll("#monthFilter button").forEach((button) => {
                    button.classList.remove("btn-dark");
                    button.classList.add("btn-outline-secondary");
                });

                loadUserExpenses();
            });

            // Function to archive previous year expenses
            function archiveExpenses() {
                const expensesRef = firebase.database().ref(`expenses/${userId}`);
                const archiveRef = firebase.database().ref(`archive_expenses/${userId}`);
                const currentYear = new Date().getFullYear();

                expensesRef.once("value", (snapshot) => {
                    snapshot.forEach((childSnapshot) => {
                        const expense = childSnapshot.val();
                        const expenseYear = new Date(expense.date).getFullYear();

                        if (expenseYear < currentYear) {
                            const expenseId = childSnapshot.key;
                            archiveRef.child(expenseId).set(expense, (error) => {
                                if (!error) {
                                    expensesRef.child(expenseId).remove();
                                } else {
                                    console.error("Error archiving expense:", error);
                                }
                            });
                        }
                    });
                    loadUserExpenses();
                });
            }

            // Function to export expenses to Excel
            function downloadExcel() {
                const expensesRef = firebase.database().ref(`expenses/${userId}`);
                const expensesArray = [];

                expensesRef.once("value", (snapshot) => {
                    snapshot.forEach((childSnapshot) => {
                        const expense = childSnapshot.val();
                        const expenseDate = new Date(expense.date);
                        const expenseDateFormatted = expenseDate.toLocaleDateString("en-GB", {
                            day: "numeric",
                            month: "short",
                            year: "numeric"
                        });

                        expensesArray.push({
                            "Title": expense.description,
                            "Amount (₹)": expense.amount.toFixed(2),
                            "Date": expenseDateFormatted,
                            "Label": expense.label || "No Label",
                            "Type": expense.type || "expense"
                        });
                    });

                    const ws = XLSX.utils.json_to_sheet(expensesArray);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "Expenses");
                    XLSX.writeFile(wb, "Expenses_List.xlsx");
                });
            }

            // Add event listener to the download button
            document.getElementById("downloadExcelBtn").addEventListener("click", downloadExcel);

            // Calculator functionality
            const display = document.getElementById("calculatorDisplay");

            function appendValue(value) {
                display.value += value;
            }

            function calculateResult() {
                try {
                    display.value = eval(display.value);
                } catch (error) {
                    alert("Invalid calculation");
                }
            }

            function clearDisplay() {
                display.value = "";
            }

            function deleteLast() {
                display.value = display.value.slice(0, -1);
            }

            // Log out function
            document.getElementById("logoutButton").addEventListener("click", () => {
                firebase.auth().signOut().then(() => {
                    window.location.href = "login.html";
                }).catch((error) => {
                    alert("Error logging out: " + error.message);
                });
            });

            // For back button
            function goBack() {
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    window.location.href = "defaultPage.html";
                }
            }
        </script>
    </div>
