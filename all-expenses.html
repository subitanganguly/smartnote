<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartNote V2 - Archived Expenses</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="js/gradient-loader.js"></script>
    <script src="js/auth.js"></script>
    <style>
        .glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.199);
        }
        
        .btn-res {
            border-radius: 20px;
            padding: 0.3rem 1rem;
            margin-right: 5px;
        }
        
        .summary-box {
            border-radius: 15px;
            padding: 10px;
            text-align: center;
        }
        
        .text-success {
            color: #28a745 !important;
        }
        
        .text-danger {
            color: #dc3545 !important;
        }
        
        .bg-success {
            background-color: #28a745 !important;
        }
        
        .bg-danger {
            background-color: #dc3545 !important;
        }
        
        .bg-primary {
            background-color: #007bff !important;
        }
        
        .badge {
            font-size: 10px;
            padding: 5px 8px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="area">
        <ul class="circles">
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>

        <nav class="navbar bg-light fixed-top">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="img/logo.png" alt="Logo" width="40" height="34" class="brand-logo">
                    <span class="mb-0">Archived </span>
                </a>
                <div class="d-flex align-items-center">
                    <button class="btn btn-outline-light me-2" onclick="goBack()">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <a class="dropdown-item d-none" href="#" id="logoutButton">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </a>
                </div>
            </div>
        </nav>

        <div class="container main-content" style="margin-top: 80px;">
            <div class="container mt-1">
                
                <!-- Summary Boxes -->
                <div class="row mb-1">
                    <div class="col-4">
                        <div class="glass bg-light p-1 text-center">
                            <small class="text-dark"><span class="d-none d-lg-inline">Records</span></small>
                            <small class="text-dark mb-0 fw-bold" id="totalRecords">0</small>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="glass bg-light p-1 text-center">
                        <small class="text-success"><span class="d-none d-lg-inline">Total Earnings (In)</span></small>
                        <small class="text-success mb-0 fw-bold" id="totalEarnings">₹0.00</small>
                    </div>
                    </div>
                    <div class="col-4">
                        <div class="glass bg-light p-1 text-center">
                        <small class="text-danger"><span class="d-none d-lg-inline">Total Expenses (Out)</span></small>
                        <small class="text-danger mb-0 fw-bold" id="totalExpenses">₹0.00</small>
                        </div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="row g-2 mb-2">
                    <!-- Search input -->
                    <div class="col-md-6">
                        <div class="input-group zoom">
                            <span class="input-group-text"><i class="fas fa-search"></i></span>
                            <input type="text" id="searchInput" class="form-control" placeholder="Search by description...">
                        </div>
                    </div>

                    <!-- Label filter -->
                    <div class="col-md-6">
                        <select id="labelFilter" class="form-select zoom text-uppercase">
                            <option value="">All Labels</option>
                        </select>
                    </div>
                </div>

                <!-- Type Filter -->
                <div class="row g-2 mb-2">
                    <div class="col-md-6">
                        <select id="typeFilter" class="form-select zoom">
                            <option value="">All Types</option>
                            <option value="earnings">Earnings Only</option>
                            <option value="expense">Expenses Only</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <select id="yearFilter" class="form-select zoom">
                            <option value="">All Years</option>
                        </select>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="mb-2">
                    <button id="resetFilter" class="btn btn-outline-light me-1 mb-2 btn-res">
                        <i class="fas fa-filter"></i> Reset
                    </button>

                    <button id="downloadExcel" class="btn btn-outline-success mb-2 btn-res">
                        <i class="fas fa-file-excel"></i> Excel
                    </button>

                    <button class="btn btn-outline-light btn-res" id="totalAmount">
                        Total: ₹0.00
                    </button>
                </div>

                <!-- Loading Spinner -->
                <center>
                    <div id="loadingSpinner" class="loader mt-3" style="display: none;" role="status">
                        <span class="sr-only"></span>
                    </div>
                </center>

                <!-- Expenses List -->
                <ul id="expensesList" class="list-group mt-3"></ul>
            </div>
        </div>
    </div>

    <script>
        const loadingSpinner = document.getElementById("loadingSpinner");
        const expensesList = document.getElementById("expensesList");
        const searchInput = document.getElementById("searchInput");
        const totalAmount = document.getElementById("totalAmount");
        const totalRecords = document.getElementById("totalRecords");
        const totalEarnings = document.getElementById("totalEarnings");
        const totalExpenses = document.getElementById("totalExpenses");
        const labelFilter = document.getElementById("labelFilter");
        const typeFilter = document.getElementById("typeFilter");
        const yearFilter = document.getElementById("yearFilter");

        let expensesData = [];
        let filteredData = [];
        let userId = null;

        // Listen for authentication state changes
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                userId = user.uid;
                loadAllExpenses();
            } else {
                console.log("User not authenticated. Redirecting...");
                window.location.href = "login.html";
            }
        });

        // Load all expenses from both current and archive
        function loadAllExpenses() {
            expensesData = [];
            loadingSpinner.style.display = "flex";

            const archiveRef = firebase.database().ref(`archive_expenses/${userId}`);
            const expensesRef = firebase.database().ref(`expenses/${userId}`);

            Promise.all([
                archiveRef.once("value"),
                expensesRef.once("value")
            ]).then(([archiveSnapshot, expensesSnapshot]) => {
                // Add archived expenses
                archiveSnapshot.forEach((childSnapshot) => {
                    const expense = childSnapshot.val();
                    expense.key = childSnapshot.key;
                    expense.isArchived = true;
                    expense.type = expense.type || "expense"; // Default for old records
                    expensesData.push(expense);
                });

                // Add current expenses
                expensesSnapshot.forEach((childSnapshot) => {
                    const expense = childSnapshot.val();
                    expense.key = childSnapshot.key;
                    expense.isArchived = false;
                    expense.type = expense.type || "expense"; // Default for old records
                    expensesData.push(expense);
                });

                // Sort by date (most recent first)
                expensesData.sort((a, b) => new Date(b.date) - new Date(a.date));

                // Populate year filter
                populateYearFilter();

                // Display expenses
                filteredData = [...expensesData];
                displayExpenses(filteredData);
                loadingSpinner.style.display = "none";
            }).catch((error) => {
                console.error("Error loading expenses:", error);
                loadingSpinner.style.display = "none";
            });
        }

        // Populate year filter dropdown
        function populateYearFilter() {
            const years = new Set();
            expensesData.forEach(expense => {
                if (expense.date) {
                    const year = new Date(expense.date).getFullYear();
                    years.add(year);
                }
            });

            yearFilter.innerHTML = '<option value="">All Years</option>';
            Array.from(years).sort((a, b) => b - a).forEach(year => {
                const option = document.createElement("option");
                option.value = year;
                option.textContent = year;
                yearFilter.appendChild(option);
            });
        }

        // Load unique labels for filter dropdown
        function loadLabels() {
            const labels = new Set();
            
            expensesData.forEach(expense => {
                if (expense.label) {
                    labels.add(expense.label);
                }
            });

            labelFilter.innerHTML = '<option value="">All Labels</option>';
            Array.from(labels).sort().forEach(label => {
                const option = document.createElement("option");
                option.value = label;
                option.textContent = label;
                labelFilter.appendChild(option);
            });
        }

        // Display expenses with filtering
        function displayExpenses(expenses) {
            expensesList.innerHTML = "";
            
            if (expenses.length === 0) {
                expensesList.innerHTML = `<li class="text-center glass zoom text-light p-3">No records found</li>`;
                updateSummary(expenses);
                return;
            }

            expenses.forEach((expense) => {
                const formattedDate = new Date(expense.date).toLocaleDateString('en-GB', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric'
                });

                // Set color based on type
                const typeColor = expense.type === "earnings" ? "text-success" : "text-danger";
                const typeIcon = expense.type === "earnings" ? "fa-arrow-up" : "fa-arrow-down";
                const typeBadge = expense.type === "earnings" ? "bg-success" : "bg-danger";

                const listItem = document.createElement("li");
                listItem.classList.add("group-item", "mb-2");

                listItem.innerHTML = `
                    <div class="glass text-light text-uppercase zoom p-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <div style="margin-left: 10px; flex: 1;">
                                <div style="font-size: 14px;">
                                    <b><i class="fas fa-wallet"></i> ${expense.description}</b>
                                </div>
                                <div style="font-size: 12px;">
                                    <span class="${typeColor}">
                                        <i class="fas ${typeIcon}"></i> ₹${expense.amount.toFixed(2)}
                                    </span>
                                    <span class="mx-2">|</span>
                                    <span>${formattedDate}</span>
                                </div>
                                <div style="font-size: 11px; margin-top: 5px;">
                                    <span class="badge bg-primary">${expense.label || 'No Label'}</span>
                                    <span class="badge ${typeBadge}">${expense.type}</span>
                                    ${expense.isArchived ? '<span class="badge bg-secondary">Archived</span>' : ''}
                                </div>
                            </div>
                            <button class="btn btn-outline-danger btn-sm delete-btn" 
                                    data-key="${expense.key}" 
                                    data-archived="${expense.isArchived}"
                                    title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
                expensesList.appendChild(listItem);
            });

            // Add event listeners to delete buttons
            document.querySelectorAll('.delete-btn').forEach(button => {
                button.addEventListener('click', function() {
                    const expenseKey = this.getAttribute('data-key');
                    const isArchived = this.getAttribute('data-archived') === 'true';
                    deleteExpense(expenseKey, isArchived);
                });
            });

            // Update summary
            updateSummary(expenses);
        }

        // Update summary boxes
        function updateSummary(expenses) {
            let totalEarningsAmount = 0;
            let totalExpensesAmount = 0;
            
            expenses.forEach(expense => {
                if (expense.type === "earnings") {
                    totalEarningsAmount += expense.amount;
                } else {
                    totalExpensesAmount += expense.amount;
                }
            });

            totalRecords.textContent = expenses.length;
            totalEarnings.innerHTML = `₹${totalEarningsAmount.toFixed(2)}`;
            totalExpenses.innerHTML = `₹${totalExpensesAmount.toFixed(2)}`;
            totalAmount.textContent = `Total: ₹${(totalEarningsAmount - totalExpensesAmount).toFixed(2)}`;
        }

        // Filter expenses based on all filters
        function filterExpenses() {
            const searchText = searchInput.value.toLowerCase();
            const selectedLabel = labelFilter.value;
            const selectedType = typeFilter.value;
            const selectedYear = yearFilter.value;

            filteredData = expensesData.filter(expense => {
                // Search filter
                const matchesSearch = searchText ? 
                    expense.description.toLowerCase().includes(searchText) : true;
                
                // Label filter
                const matchesLabel = selectedLabel ? 
                    expense.label === selectedLabel : true;
                
                // Type filter
                const matchesType = selectedType ? 
                    expense.type === selectedType : true;
                
                // Year filter
                let matchesYear = true;
                if (selectedYear && expense.date) {
                    const expenseYear = new Date(expense.date).getFullYear();
                    matchesYear = expenseYear.toString() === selectedYear;
                }

                return matchesSearch && matchesLabel && matchesType && matchesYear;
            });

            displayExpenses(filteredData);
        }

        // Delete expense
        // Delete expense
function deleteExpense(expenseKey, isArchived) {
    if (!confirm("Are you sure you want to delete this expense permanently?")) {
        return;
    }

    if (!userId) return;

    const expenseRef = isArchived 
        ? firebase.database().ref(`archive_expenses/${userId}/${expenseKey}`)
        : firebase.database().ref(`expenses/${userId}/${expenseKey}`);

    // Show loading spinner
    loadingSpinner.style.display = "flex";

    expenseRef.remove()
        .then(() => {
            // Remove from local data
            expensesData = expensesData.filter(expense => 
                !(expense.key === expenseKey && expense.isArchived === isArchived)
            );
            
            // Update filtered data based on current filters
            filterExpenses();
            
            // Reload labels and years from updated expensesData
            loadLabels();
            populateYearFilter();
            
            alert("Expense deleted successfully!");
        })
        .catch((error) => {
            alert("Error deleting expense: " + error.message);
            console.error("Delete error:", error);
        })
        .finally(() => {
            // Hide loading spinner
            loadingSpinner.style.display = "none";
        });
}

        // Reset all filters
        function resetFilters() {
            searchInput.value = "";
            labelFilter.value = "";
            typeFilter.value = "";
            yearFilter.value = "";
            
            filteredData = [...expensesData];
            displayExpenses(filteredData);
        }

        // Go back function
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = "index.html";
            }
        }

        // Event listeners for filters
        searchInput.addEventListener("input", filterExpenses);
        labelFilter.addEventListener("change", filterExpenses);
        typeFilter.addEventListener("change", filterExpenses);
        yearFilter.addEventListener("change", filterExpenses);

        // Reset filter button
        document.getElementById("resetFilter").addEventListener("click", resetFilters);

        // Logout function
        document.getElementById("logoutButton").addEventListener("click", () => {
            firebase.auth().signOut().then(() => {
                window.location.href = "login.html";
            }).catch((error) => {
                alert("Error logging out: " + error.message);
            });
        });

        // Download Excel
        document.getElementById("downloadExcel").addEventListener("click", function() {
            if (filteredData.length === 0) {
                alert("No expenses to download!");
                return;
            }

            const data = filteredData.map(expense => ({
                Description: expense.description,
                Amount: `₹${expense.amount.toFixed(2)}`,
                Date: new Date(expense.date).toLocaleDateString('en-GB', { 
                    day: '2-digit', 
                    month: 'short', 
                    year: 'numeric' 
                }),
                Label: expense.label || 'No Label',
                Type: expense.type || 'expense',
                Status: expense.isArchived ? 'Archived' : 'Current'
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Archived Expenses");
            XLSX.writeFile(wb, "Archived_Expenses.xlsx");
        });

        // Initialize labels after data is loaded
        function initializeLabels() {
            loadLabels();
        }

        // Override the loadAllExpenses to also initialize labels
        const originalLoadAllExpenses = loadAllExpenses;
        loadAllExpenses = function() {
            originalLoadAllExpenses().then(() => {
                initializeLabels();
            });
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
